<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imperium Deck Client</title>
    <style>
      html, body { margin: 0; height: 100%; background: #111923; color: #eef6ff; font-family: sans-serif; }
      #wrap { height: 100%; display: grid; grid-template-rows: auto 1fr; }
      #bar { display: flex; gap: 8px; align-items: center; padding: 8px 10px; background: #192738; border-bottom: 1px solid #2b4157; }
      #status { opacity: 0.8; font-size: 13px; }
      button { border: 1px solid #2b4157; background: #23384d; color: #eef6ff; border-radius: 6px; padding: 5px 9px; cursor: pointer; }
      iframe { width: 100%; height: 100%; border: 0; background: #0f1720; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="bar">
        <button id="reload" type="button">Reload</button>
        <div id="status">Loading http://127.0.0.1:8765 ...</div>
      </div>
      <iframe id="client" src="http://127.0.0.1:8765"></iframe>
    </div>
    <script>
      const frame = document.getElementById('client');
      const status = document.getElementById('status');
      document.getElementById('reload').addEventListener('click', () => {
        frame.src = 'http://127.0.0.1:8765';
      });
      frame.addEventListener('load', () => {
        status.textContent = 'Connected to local deck client';
      });
      setTimeout(() => {
        if (status.textContent.startsWith('Loading')) {
          status.textContent = 'Waiting for service at http://127.0.0.1:8765';
        }
      }, 5000);
    </script>
  </body>
</html>
